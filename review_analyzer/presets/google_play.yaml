# 셀렉터 갱신: 2026-04-07 (Google Play 앱 상세 페이지 DOM 기준)
# container: div.EGFGHd — 리뷰 카드
# 메인 페이지에서는 보통 3~5개만 노출되며, 더 많은 리뷰는 "See all reviews" 다이얼로그에 있음.
name: google_play
display_name: "구글 플레이 스토어 리뷰"
description: "Google Play Store 앱 리뷰 수집 + AI 분석. 메인 페이지 노출 리뷰 3~5개 기준."

driver:
  type: selenium
  headless: true
  wait_seconds: 5
  scroll_to_bottom: true

pagination:
  # Google Play 메인 페이지는 리뷰가 고정 3~5개만 노출됨.
  # 전체 리뷰는 다이얼로그 모달로 열리는데, Selenium으로는 불안정해서 단일 페이지 수집만 지원.
  type: none
  max_pages: 1

selectors:
  container: "div.EGFGHd"
  fields:
    reviewer: "div.X5PpBb"
    rating: "div.iXRFPc@aria-label"   # "Rated 4 stars out of five stars"
    date: "span.bp9Aid"
    content: "div.h3YV2d"
    helpful: "div.AJTPZc"
    developer_reply: "div.ocpBU"

analysis:
  text_column: content
  rating_column: rating
  # aria-label 문자열 "Rated 4 stars out of five stars"에서 첫 숫자 추출
  rating_parse_pattern: "(\\d+)"
  sentiment_method: rating_based

rate_limit:
  requests_per_minute: 15
  delay_between_pages: 4.0
