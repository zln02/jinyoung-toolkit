# 셀렉터는 2026-04 시점 추정값. iTunes RSS는 공개 API라 비교적 안정적이나,
# 응답 스키마 변경 시 갱신 필요.
name: apple_app_store
display_name: "Apple App Store 리뷰"
description: "Apple 앱스토어의 앱 리뷰를 모아요 (별도 로그인 불필요)"

driver:
  type: api

pagination:
  type: url_param
  # 사용자는 ?page=1 까지 포함해서 입력 (예: https://itunes.apple.com/.../json?page=1)
  url_template: "{base}?page={page}"
  start: 1
  step: 1
  max_pages: 10

selectors:
  format: json
  container: "feed.entry"
  fields:
    reviewer: "author.name.label"
    rating: "im:rating.label"
    title: "title.label"
    content: "content.label"
    date: "updated.label"

analysis:
  text_column: content
  rating_column: rating
  sentiment_method: rating_based

rate_limit:
  requests_per_minute: 30
  delay_between_pages: 1.0
